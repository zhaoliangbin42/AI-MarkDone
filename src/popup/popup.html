<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI-MarkDone</title>
    <style>
      :root {
        --aimd-ref-color-neutral-0: #ffffff;
        --aimd-ref-color-neutral-50: #f6f7f9;
        --aimd-ref-color-neutral-500: #6b7280;
        --aimd-ref-color-neutral-700: #374151;
        --aimd-ref-color-neutral-900: #111827;
        --aimd-ref-color-neutral-alpha-06: rgba(0, 0, 0, 0.06);
        --aimd-ref-color-neutral-alpha-08: rgba(0, 0, 0, 0.08);
        --aimd-ref-color-neutral-alpha-12: rgba(0, 0, 0, 0.12);
        --aimd-ref-color-neutral-alpha-16: rgba(0, 0, 0, 0.16);
        --aimd-ref-color-brand-600: #2563eb;
        --aimd-ref-color-brand-700: #1d4ed8;
        --aimd-ref-color-brand-alpha-12: rgba(37, 99, 235, 0.12);
        --aimd-ref-color-brand-alpha-28: rgba(37, 99, 235, 0.28);
        --aimd-ref-color-neutral-white: #ffffff;
        --aimd-ref-shadow-300: 0 10px 24px rgba(0, 0, 0, 0.18);
        --aimd-ref-shadow-500: 0 18px 50px rgba(0, 0, 0, 0.25);
        --aimd-ref-type-size-075: 12px;
        --aimd-ref-type-size-100: 13px;
        --aimd-ref-type-size-200: 14px;
        --aimd-ref-type-size-300: 16px;
        --aimd-ref-type-weight-500: 500;
        --aimd-ref-type-weight-600: 600;
        --aimd-ref-radius-200: 8px;
        --aimd-ref-radius-300: 12px;
        --aimd-ref-radius-400: 16px;
        --aimd-ref-radius-full: 999px;
        --aimd-ref-space-100: 4px;
        --aimd-ref-space-200: 8px;
        --aimd-ref-space-300: 12px;
        --aimd-ref-space-400: 16px;
        --aimd-ref-size-300: 30px;
        --aimd-ref-size-400: 40px;
        --aimd-ref-size-440: 44px;
        --aimd-ref-motion-duration-fast: 150ms;
        --aimd-ref-motion-easing-standard: cubic-bezier(0.4, 0, 0.2, 1);

        --aimd-bg-primary: var(--aimd-ref-color-neutral-50);
        --aimd-bg-surface: var(--aimd-ref-color-neutral-0);
        --aimd-bg-secondary: color-mix(in srgb, var(--aimd-bg-primary) 82%, var(--aimd-bg-surface));
        --aimd-text-primary: var(--aimd-ref-color-neutral-900);
        --aimd-text-secondary: var(--aimd-ref-color-neutral-700);
        --aimd-border-default: var(--aimd-ref-color-neutral-alpha-12);
        --aimd-border-strong: var(--aimd-ref-color-neutral-alpha-16);
        --aimd-interactive-primary: var(--aimd-ref-color-brand-600);
        --aimd-interactive-primary-hover: var(--aimd-ref-color-brand-700);
        --aimd-interactive-selected: var(--aimd-ref-color-brand-alpha-12);
        --aimd-text-on-primary: var(--aimd-ref-color-neutral-white);
        --aimd-shadow-lg: var(--aimd-ref-shadow-300);
        --aimd-radius-lg: var(--aimd-ref-radius-200);
        --aimd-radius-xl: var(--aimd-ref-radius-300);
        --aimd-radius-2xl: var(--aimd-ref-radius-400);
        --aimd-radius-full: var(--aimd-ref-radius-full);
        --aimd-space-1: var(--aimd-ref-space-100);
        --aimd-space-2: var(--aimd-ref-space-200);
        --aimd-space-3: var(--aimd-ref-space-300);
        --aimd-space-4: var(--aimd-ref-space-400);
        --aimd-space-5: calc(var(--aimd-space-4) + var(--aimd-space-1));
        --aimd-space-6: calc(var(--aimd-space-4) + var(--aimd-space-2));
        --aimd-size-logo: var(--aimd-ref-size-400);
        --aimd-size-action-row: var(--aimd-ref-size-440);
        --aimd-text-xs: var(--aimd-ref-type-size-075);
        --aimd-text-sm: var(--aimd-ref-type-size-100);
        --aimd-text-base: var(--aimd-ref-type-size-200);
        --aimd-text-lg: var(--aimd-ref-type-size-300);
        --aimd-font-medium: var(--aimd-ref-type-weight-500);
        --aimd-font-semibold: var(--aimd-ref-type-weight-600);
        --aimd-duration-fast: var(--aimd-ref-motion-duration-fast);
        --aimd-ease-in-out: var(--aimd-ref-motion-easing-standard);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-width: 320px;
        background:
          radial-gradient(circle at top right, var(--aimd-interactive-selected), transparent 38%),
          var(--aimd-bg-primary);
        color: var(--aimd-text-primary);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, Roboto, Helvetica, Arial, sans-serif;
      }

      body {
        padding: var(--aimd-space-4);
      }

      .popup-shell {
        display: grid;
        gap: var(--aimd-space-5);
        padding: var(--aimd-space-5);
        border-radius: var(--aimd-radius-2xl);
        border: 1px solid var(--aimd-border-default);
        background:
          linear-gradient(180deg, color-mix(in srgb, var(--aimd-bg-surface) 97%, transparent), color-mix(in srgb, var(--aimd-bg-surface) 90%, transparent)),
          var(--aimd-bg-surface);
        box-shadow: var(--aimd-shadow-lg);
      }

      .popup-header {
        display: grid;
        gap: var(--aimd-space-3);
      }

      .popup-brand {
        display: flex;
        align-items: center;
        gap: var(--aimd-space-3);
      }

      .popup-logo {
        width: var(--aimd-size-logo);
        height: var(--aimd-size-logo);
        border-radius: var(--aimd-radius-xl);
        border: 1px solid var(--aimd-border-default);
        background: color-mix(in srgb, var(--aimd-bg-surface) 80%, transparent);
      }

      .popup-title {
        margin: 0;
        font-size: var(--aimd-text-lg);
        line-height: 1.2;
        font-weight: var(--aimd-font-semibold);
      }

      .popup-note {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        min-height: 28px;
        padding: 0 var(--aimd-space-3);
        border-radius: var(--aimd-radius-full);
        background: var(--aimd-interactive-selected);
        color: var(--aimd-interactive-primary);
        font-size: var(--aimd-text-xs);
        font-weight: var(--aimd-font-semibold);
        letter-spacing: 0.01em;
      }

      .popup-links {
        display: grid;
        gap: var(--aimd-space-2);
      }

      .popup-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--aimd-space-3);
        min-height: var(--aimd-size-action-row);
        padding: 0 var(--aimd-space-4);
        border-radius: var(--aimd-radius-lg);
        border: 1px solid var(--aimd-border-default);
        background: color-mix(in srgb, var(--aimd-bg-surface) 72%, transparent);
        color: var(--aimd-text-primary);
        font-size: var(--aimd-text-sm);
        font-weight: var(--aimd-font-medium);
        text-decoration: none;
        transition:
          border-color var(--aimd-duration-fast) var(--aimd-ease-in-out),
          background var(--aimd-duration-fast) var(--aimd-ease-in-out),
          transform var(--aimd-duration-fast) var(--aimd-ease-in-out);
      }

      .popup-link:hover {
        border-color: var(--aimd-border-strong);
        background: color-mix(in srgb, var(--aimd-bg-surface) 94%, transparent);
        transform: translateY(-1px);
      }

      .popup-link__meta {
        display: grid;
        gap: calc(var(--aimd-space-1) / 2);
      }

      .popup-link__label {
        font-size: var(--aimd-text-sm);
        font-weight: var(--aimd-font-semibold);
      }

      .popup-link__hint {
        color: var(--aimd-text-secondary);
        font-size: var(--aimd-text-xs);
        font-weight: 400;
      }

      .popup-link__arrow {
        color: var(--aimd-text-secondary);
        font-size: var(--aimd-text-lg);
      }

      .popup-footer {
        display: grid;
        gap: var(--aimd-space-3);
        padding-top: var(--aimd-space-4);
        border-top: 1px solid var(--aimd-border-default);
      }

      .popup-footer__text {
        margin: 0;
        color: var(--aimd-text-secondary);
        font-size: var(--aimd-text-xs);
        line-height: 1.6;
      }

    </style>
  </head>
  <body>
    <main class="popup-shell">
      <section class="popup-header">
        <div class="popup-note">Unsupported page</div>
        <div class="popup-brand">
          <img class="popup-logo" src="/icons/icon48.png" alt="AI-MarkDone logo" />
          <div class="popup-brand__copy">
            <h1 class="popup-title">AI-MarkDone</h1>
          </div>
        </div>
      </section>

      <section class="popup-links">
        <a class="popup-link" href="https://chatgpt.com/" target="_blank" rel="noreferrer">
          <span class="popup-link__meta">
            <span class="popup-link__label">ChatGPT</span>
            <span class="popup-link__hint">Primary supported site</span>
          </span>
          <span class="popup-link__arrow" aria-hidden="true">→</span>
        </a>
        <a class="popup-link" href="https://gemini.google.com/" target="_blank" rel="noreferrer">
          <span class="popup-link__meta">
            <span class="popup-link__label">Gemini</span>
            <span class="popup-link__hint">Google AI conversations</span>
          </span>
          <span class="popup-link__arrow" aria-hidden="true">→</span>
        </a>
        <a class="popup-link" href="https://claude.ai/" target="_blank" rel="noreferrer">
          <span class="popup-link__meta">
            <span class="popup-link__label">Claude</span>
            <span class="popup-link__hint">Anthropic chat workspace</span>
          </span>
          <span class="popup-link__arrow" aria-hidden="true">→</span>
        </a>
        <a class="popup-link" href="https://chat.deepseek.com/" target="_blank" rel="noreferrer">
          <span class="popup-link__meta">
            <span class="popup-link__label">DeepSeek</span>
            <span class="popup-link__hint">DeepSeek chat surface</span>
          </span>
          <span class="popup-link__arrow" aria-hidden="true">→</span>
        </a>
      </section>

      <footer class="popup-footer">
        <p class="popup-footer__text">
          The toolbar icon becomes active when the current tab matches one of the supported hosts above.
        </p>
      </footer>
    </main>
  </body>
</html>
