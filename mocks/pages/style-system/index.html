<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-MarkDone Page System Showcase</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #eef2f7;
        color: #111827;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1520px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 36px 0 72px;
      }

      .page-head {
        display: grid;
        gap: 8px;
        margin-bottom: 24px;
      }

      .page-head h1,
      .page-head p {
        margin: 0;
      }

      .page-head h1 {
        font-size: 28px;
        line-height: 1.15;
      }

      .page-head p {
        max-width: 900px;
        color: #4b5563;
        line-height: 1.6;
      }

      @media (max-width: 720px) {
        main {
          width: min(100vw - 24px, 520px);
          padding-top: 24px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="page-head">
        <h1>AI-MarkDone Page System Showcase</h1>
        <p>
          Page-level mock suite for popup, host runtime, reader, bookmarks manager,
          save dialogs, send surfaces, directory rail, progress panel, and settings/info pages.
        </p>
      </header>
      <section id="page-system-stage"></section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
