<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-MarkDone Design System Showcase</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eef2f7;
        color: #111827;
      }

      main {
        width: min(1480px, calc(100vw - 48px));
        margin: 0 auto;
        padding: 36px 0 64px;
      }

      .page-head {
        display: grid;
        gap: 8px;
        margin-bottom: 24px;
      }

      .page-head h1,
      .page-head p {
        margin: 0;
      }

      .page-head h1 {
        font-size: 28px;
        line-height: 1.15;
      }

      .page-head p {
        max-width: 820px;
        color: #4b5563;
        line-height: 1.6;
      }

      .showcase-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
        align-items: start;
      }

      @media (max-width: 1100px) {
        .showcase-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header class="page-head">
        <h1>AI-MarkDone Design System Showcase</h1>
        <p>
          Static mock-first surface driven by real AIMD tokens, real Shadow DOM mounting,
          and the same style injection path used by runtime UI.
        </p>
      </header>
      <section class="showcase-grid" id="design-system-stage"></section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
