<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-MarkDone Workflow Dialogs</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
        background: #f5f5f4;
        color: #1c1917;
      }
      body[data-theme="dark"] { background: #171717; color: #f5f5f4; }
      main {
        min-height: 100vh;
        padding: 24px;
        display: grid;
        place-items: center;
      }
      .launcher {
        width: min(760px, 100%);
        padding: 20px;
        border: 1px solid currentColor;
        border-radius: 18px;
        opacity: 0.92;
      }
      .launcher h1 { margin: 0 0 8px; font-size: 22px; }
      .launcher p { margin: 0 0 16px; opacity: 0.72; }
      .launcher__actions { display: flex; flex-wrap: wrap; gap: 10px; }
      .launcher button {
        min-height: 38px;
        padding: 0 14px;
        border: 1px solid currentColor;
        border-radius: 999px;
        background: transparent;
        color: inherit;
        font: inherit;
        cursor: pointer;
      }
      .mock-conversation { display: none; }
      @media (max-width: 560px) {
        main { padding: 12px; }
        .launcher { padding: 16px; }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="launcher">
        <h1 data-role="fixture-title">Workflow dialog launcher</h1>
        <p data-role="fixture-description">Real production modules opened through their user-facing controls.</p>
        <div class="launcher__actions">
          <button type="button" data-action="open-bookmark">Bookmark Save</button>
          <button type="button" data-action="open-export">Save Messages</button>
          <button type="button" data-action="open-send">Send</button>
        </div>
        <div class="mock-conversation" data-role="mock-conversation"></div>
        <div data-role="send-shadow-host"></div>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
